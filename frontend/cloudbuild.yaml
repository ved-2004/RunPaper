# ══════════════════════════════════════════════════════════
# RunPaper Frontend — GCP Cloud Build Configuration
# ══════════════════════════════════════════════════════════
#
# Setup:
#   1. Connect GitHub repo to Cloud Build trigger (main branch)
#   2. Set substitution variables in the trigger:
#      _SERVICE_NAME, _REGION, _BACKEND_URL

steps:
  # Step 1: Write .env.production so `next build` bakes in the correct backend URL.
  # NEXT_PUBLIC_* vars are inlined at build time — Cloud Run --set-env-vars has no effect.
  - name: 'bash'
    id: 'write-env'
    args:
      - '-c'
      - 'echo "NEXT_PUBLIC_API_BASE_URL=${_BACKEND_URL}" > frontend/.env.production'

  # Step 2: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
      - '-f'
      - 'frontend/Dockerfile'
      - './frontend'
    env:
      - 'DOCKER_BUILDKIT=1'
    waitFor: ['write-env']

  # Step 3: Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
    waitFor: ['build']

  # Step 4: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--timeout=60'
      - '--max-instances=100'
    waitFor: ['push']

# Image registry
images:
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'

# Substitutions — override _BACKEND_URL in the Cloud Build trigger settings
substitutions:
  _SERVICE_NAME: 'runpaper-frontend'
  _REGION: 'us-central1'
  _BACKEND_URL: 'https://runpaper-backend-352633166774.us-east1.run.app'

timeout: '900s'

options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
