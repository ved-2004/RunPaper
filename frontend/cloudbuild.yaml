# ══════════════════════════════════════════════════════════
# RunPaper Frontend — GCP Cloud Build Configuration
# ══════════════════════════════════════════════════════════
#
# Builds Next.js app and deploys to Cloud Run.
#
# Setup:
#   1. Connect GitHub repo to Cloud Build
#   2. Set substitution variables (_SERVICE_NAME, _REGION)
#   3. Create secrets for environment variables in Secret Manager
#   4. Update --set-env-vars or --set-secrets below

steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
      - '-f'
      - 'frontend/Dockerfile'
      - './frontend'
    env:
      - 'DOCKER_BUILDKIT=1'

  # Step 2: Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
    waitFor: ['build']

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=1Gi'
      - '--timeout=60'
      - '--max-instances=100'
      - '--set-env-vars=NEXT_PUBLIC_API_BASE_URL=${_BACKEND_URL}'
      # Uncomment to set secrets from Secret Manager:
      # - '--set-secrets=GOOGLE_CLIENT_ID=projects/PROJECT_ID/secrets/google-client-id/versions/latest'
    waitFor: ['push']

# Image registry
images:
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'

# Substitutions (set in Cloud Build trigger)
substitutions:
  _SERVICE_NAME: 'runpaper-frontend'
  _REGION: 'us-central1'
  _BACKEND_URL: 'https://runpaper-backend-xxx.run.app'

# Build timeout
timeout: '900s'

# Build options
options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
