# ══════════════════════════════════════════════════════════
# RunPaper Backend — GCP Cloud Build Configuration
# ══════════════════════════════════════════════════════════
#
# This config builds a Docker image and deploys to Cloud Run.
#
# Setup:
#   1. Connect your GitHub repo to Cloud Build
#   2. Create a trigger for main branch
#   3. Set these substitution variables in Cloud Build trigger settings:
#      - _SERVICE_NAME: runpaper-backend (or your preferred name)
#      - _REGION: us-central1 (or your preferred region)
#   4. Ensure service account has:
#      - Cloud Run Admin
#      - Service Account User
#      - Cloud Build Editor roles

steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
      - '-f'
      - 'backend/Dockerfile'
      - './backend'
    env:
      - 'DOCKER_BUILDKIT=1'

  # Step 2: Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
    waitFor: ['build']

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gke-deploy'
    id: 'deploy'
    args:
      - 'run'
      - '--filename=.'
      - '--image=gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
      - '--location=${_REGION}'
      - '--output=/workspace/output'
    env:
      - 'CLOUDSDK_COMPUTE_REGION=${_REGION}'
      - 'CLOUDSDK_CONTAINER_CLUSTER=${_SERVICE_NAME}'
    waitFor: ['push']

  # Alternative: Deploy to Cloud Run directly (recommended for simple deployments)
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy-cloudrun'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--set-env-vars=ENVIRONMENT=production'
      - '--memory=2Gi'
      - '--timeout=600'
      - '--max-instances=100'
      # Add your secrets via Cloud Run secrets manager:
      # --set-secrets=ANTHROPIC_API_KEY=projects/PROJECT_ID/secrets/anthropic-key/versions/latest
    waitFor: ['push']

# Image to build (pushed to Container Registry)
images:
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'

# Substitutions (set in Cloud Build trigger)
substitutions:
  _SERVICE_NAME: 'runpaper-backend'
  _REGION: 'us-central1'

# Build timeout (15 minutes)
timeout: '900s'

# Build options
options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
