# ══════════════════════════════════════════════════════════
# RunPaper Backend — GCP Cloud Build Configuration
# ══════════════════════════════════════════════════════════
#
# Setup:
#   1. Connect GitHub repo to Cloud Build trigger (main branch)
#   2. Set substitution variables in the trigger:
#      _SERVICE_NAME, _REGION, _FRONTEND_URL, _BACKEND_URL, _LLM_SERVICE_URL
#   3. Store secrets in Secret Manager and reference them below
#   4. Grant the Cloud Build SA: Cloud Run Admin, Secret Manager Accessor,
#      Service Account User roles

steps:
  # Step 1: Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
      - '-t'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'
      - '-f'
      - 'backend/Dockerfile'
      - './backend'
    env:
      - 'DOCKER_BUILDKIT=1'

  # Step 2: Push image to Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push'
    args:
      - 'push'
      - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
    waitFor: ['build']

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/cloud-builders/gcloud'
    id: 'deploy'
    args:
      - 'run'
      - 'deploy'
      - '${_SERVICE_NAME}'
      - '--image=gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
      - '--region=${_REGION}'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--memory=2Gi'
      - '--timeout=600'
      - '--max-instances=100'
      # Runtime env vars — safe to set here (not baked into image)
      - '--set-env-vars=ENVIRONMENT=production,BACKEND_URL=${_BACKEND_URL},FRONTEND_URL=${_FRONTEND_URL},LLM_SERVICE_URL=${_LLM_SERVICE_URL},LLM_PROVIDER=anthropic'
      # Secrets from Secret Manager — add your project ID
      # - '--set-secrets=SUPABASE_URL=runpaper-supabase-url:latest,SUPABASE_SERVICE_KEY=runpaper-supabase-key:latest,DATABASE_URL=runpaper-db-url:latest,GOOGLE_CLIENT_ID=runpaper-google-client-id:latest,GOOGLE_CLIENT_SECRET=runpaper-google-client-secret:latest,JWT_SECRET=runpaper-jwt-secret:latest,LLM_SERVICE_KEY=runpaper-llm-service-key:latest,SUPABASE_BUCKET=runpaper-supabase-bucket:latest'
    waitFor: ['push']

# Image registry
images:
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:$SHORT_SHA'
  - 'gcr.io/$PROJECT_ID/${_SERVICE_NAME}:latest'

# Substitutions (override in Cloud Build trigger settings)
substitutions:
  _SERVICE_NAME: 'runpaper-backend'
  _REGION: 'us-central1'
  _BACKEND_URL: 'https://runpaper-backend-xxxx-uc.a.run.app'
  _FRONTEND_URL: 'https://runpaper-frontend-xxxx-uc.a.run.app'
  _LLM_SERVICE_URL: 'https://runpaper-llm-xxxx-uc.a.run.app'

timeout: '900s'

options:
  machineType: 'N1_HIGHCPU_8'
  logging: CLOUD_LOGGING_ONLY
